version: '3.1'

services:

  database:
    image: postgres:14.2
    restart: always
    container_name: database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: starwars
    command: ['postgres', '-c', 'wal_level=logical']
    volumes:
      - ./sql-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5442:5432